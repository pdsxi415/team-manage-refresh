services:
  - type: web
    name: team-manage-refresh
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: DEBUG
        value: "False"
      - key: TIMEZONE
        value: Asia/Shanghai
